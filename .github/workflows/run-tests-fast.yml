# .github/workflows/run-tests-fast.yml
#
# Fast CI
name: Run tests-fast

on:
  # Runs on every PR to main.
  pull_request:
    branches: ['main']  # PRs targeting main.

  # Runs on pushes to main.
  push:
    branches: ['main']  # Direct commits and merges into main.

  workflow_dispatch:    # Allows manual run from GitHub UI.

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go Task
        uses: arduino/setup-task@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

    #   - name: Install dependencies
      - name: Install dependencies
        run: |            
            pip install -e .[dev]   # -e means in editable mode, [dev] means also install the optional dependency group called dev

      - name: Run tests
        run: task test
