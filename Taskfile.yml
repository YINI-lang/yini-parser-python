# Taskfile.yml for yini-parser-python.

# Setup new file on Windows:
# winget install Task.Task
# task --init

version: '3'

vars:
  GRAMMAR_BASE: ./grammar/v1.0.0-rc.5xx
#  BASE_FILE:    YiniLexerBase.py  # Target/language specific base file.

  PARSER_FILE:  "{{.GRAMMAR_BASE}}/YiniParser.g4"
  LEXER_FILE:   "{{.GRAMMAR_BASE}}/YiniLexer.g4"
  ANTLR_JAR:    ./libs/antlr4/antlr4-4.13.2-complete.jar
  DIR_OUTPUT:   ./src/yini_parser/grammar/generated
  START_RULE:   yini

tasks:
  default:
    cmds:
      - task --list

  antlr-help:
    desc: Show ANTLR help
    cmds:
      - java -jar {{.ANTLR_JAR}} -help

  start:
    desc: Start the project.
    cmds:
  #    - python src/main.py ./sample/basic.yini
       - python src/main.py sample/basic.yini

  dev:
    desc: Run development entrypoint
    cmds:
        - python src/dev.py 

  install:
    desc: Install Python packages
    cmds:
      - python -m pip install -r requirements.txt

  install-dev:
    desc: Install Python packages
    cmds:
      - python -m pip install -r requirements-dev.txt

  antlr:
    desc: Generate sources for the grammar (Windows only)
    platforms: [windows]
    cmds:
      - echo Generate sources for the grammar...
#      - mkdir {{.DIR_OUTPUT}}/base
#      - cp {{.GRAMMAR_BASE}}/base/{{.BASE_FILE}} {{.DIR_OUTPUT}}/base
      - >
        java -jar {{.ANTLR_JAR}}
        -Dlanguage=Python3
        -no-listener -visitor
        -o {{.DIR_OUTPUT}}
        {{.LEXER_FILE}}
        {{.PARSER_FILE}}
      - echo Done.

  # ci-generate:
  #   desc: Generate lexer and parser for CI (Linux only)
  #   platforms: [linux]
  #   deps: [ci-gen-lexer, ci-gen-parser]
  #   cmds:
  #     - echo "Generation done."

  # ci-gen-lexer:
  #   desc: Generate lexer in CI (Linux only)
  #   platforms: [linux]
  #   cmds:
  #     - echo "Generates lexer (forces tokens into {{.DIR_OUTPUT}})..."
  #     - >
  #       java -Xmx1g -jar {{.ANTLR_JAR}}
  #       -Werror -long-messages
  #       -Dlanguage=Python3
  #       -no-listener -visitor
  #       -o {{.DIR_OUTPUT}} -Xexact-output-dir
  #       {{.LEXER_FILE}}
  #     - echo
  #     - echo "Contents of {{.DIR_OUTPUT}}:"
  #     - ls -la {{.DIR_OUTPUT}}
  #     - test -f "{{.DIR_OUTPUT}}/YiniLexer.tokens" || ( echo "::error::Missing {{.DIR_OUTPUT}}/YiniLexer.tokens after lexer generation"; exit 2 )
  #     - echo

  # ci-gen-parser:
  #   desc: Generate parser in CI using tokenVocab from output dir (Linux only)
  #   platforms: [linux]
  #   cmds:
  #     - echo "Generates parser (using tokenVocab from {{.DIR_OUTPUT}})..."
  #     - >
  #       java -Xmx1g -jar {{.ANTLR_JAR}}
  #       -Werror -long-messages
  #       -Dlanguage=Python3
  #       -no-listener -visitor
  #       -o {{.DIR_OUTPUT}}
  #       -lib {{.DIR_OUTPUT}}
  #       {{.PARSER_FILE}}

  update-antlr:
    desc: Generate using antlr4 wrapper (Windows only)
    platforms: [windows]
    cmds:
      - echo Generate sources for the grammar...
      - >
        java -jar {{.ANTLR_JAR}}
        -o {{.DIR_OUTPUT}}
        -Dlanguage=Python3
        {{.PARSER_FILE}}
        {{.LEXER_FILE}}
        -no-listener -visitor
      - echo Done.

#  tokens:
#    desc: Run antlr4-parse and print tokens
#    cmds:
#      - antlr4-parse {{.PARSER_FILE}} {{.LEXER_FILE}} {{.START_RULE}} sample.yini -tokens

  check:
    desc: Run all project checks.
    deps: [lint, typecheck, test]

  test:
    desc: Run tests
    cmds:
      - python -m pytest -v

  test-adapter:
    desc: Run the yini-test adapter against the sample basic YINI file
    cmds:
      - python tools/yini_parser_adapter.py --input sample/basic.yini

  test-adapter-strict:
    desc: Run the yini-test adapter in strict mode against a strict sample file
    cmds:
      - python tools/yini_parser_adapter.py --input sample/basic.strict.yini --mode strict
      
  lint:
    desc: Run Ruff linter
    cmds:
      - python -m ruff check src

  typecheck:
    desc: Run mypy type checking
    cmds:
      #- python -m mypy src
      #- python -m mypy src/main.py src/yini-parser/core
      #- python -m mypy src
      # - python -m mypy -p src/yini_parser --explicit-package-bases --exclude "src[/\\\\]yini_parser[/\\\\]grammar[/\\\\]generated[/\\\\]" --ignore-missing-imports
      - cmd /c "set MYPYPATH=src&& python -m mypy -p yini_parser --explicit-package-bases --ignore-missing-imports"

  clean-gen:
    desc: Delete generated ANTLR output directory contents (Windows only)
    platforms: [windows]
    cmds:
      #- rmdir /s /q "{{.DIR_OUTPUT}}"
      #- cmd /c rmdir /s /q "{{.DIR_OUTPUT}}"
      - powershell -NoProfile -Command "if (Test-Path '{{.DIR_OUTPUT}}') { Remove-Item -Recurse -Force '{{.DIR_OUTPUT}}' }"

  # Deletes Python caches under src:
  #   - __pycache__ directories
  #   - .pyc files
  #   - .pyo files, if any
  clean-cache:
    desc: Delete Python cache files and __pycache__ directories under src (Windows only)
    platforms: [windows]
    cmds:
      - powershell -NoProfile -Command "Get-ChildItem 'src' -Recurse -Directory -Filter '__pycache__' | Remove-Item -Recurse -Force"
      - powershell -NoProfile -Command "Get-ChildItem 'src' -Recurse -File -Include *.pyc,*.pyo | Remove-Item -Force"
      - powershell -NoProfile -Command "Get-ChildItem 'tests' -Recurse -Directory -Filter '__pycache__' | Remove-Item -Recurse -Force"
      - powershell -NoProfile -Command "Get-ChildItem 'tests' -Recurse -File -Include *.pyc,*.pyo | Remove-Item -Force"
  
  clean:
    desc: Run all cleanup tasks
    deps:
      - clean-gen
      - clean-cache
