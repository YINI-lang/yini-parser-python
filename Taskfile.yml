# Taskfile.yml for yini-parser-python.

# Setup new file (Taskfile.yaml) on Windows:
# winget install Task.Task
# task --init

version: '3'

vars:
  GRAMMAR_BASE: ./grammar/v1.0.0-rc.5x

  PARSER_FILE:  "{{.GRAMMAR_BASE}}/YiniParser.g4"
  LEXER_FILE:   "{{.GRAMMAR_BASE}}/YiniLexer.g4"
  ANTLR_JAR:    ./libs/antlr4/antlr4-4.13.2-complete.jar
  DIR_OUTPUT:   ./src/grammar/generated
  START_RULE:   yini

tasks:
  default:
    cmds:
      - task --list

  antlr-help:
    desc: Show ANTLR help
    cmds:
      - java -jar {{.ANTLR_JAR}} -help

  start:
    desc: Start the project (after running install first).
    cmds:
      - python src/main.py ./sample/basic.yini

  install:
    desc: Install Python packages
    cmds:
      - python -m pip install -r requirements.txt

  generate-antlr:
    desc: Generate sources for the grammar
    #platforms: [windows]
    cmds:
      - echo Generate sources for the grammar...
#      - mkdir {{.DIR_OUTPUT}}/base
#      - cp {{.GRAMMAR_BASE}}/base/{{.BASE_FILE}} {{.DIR_OUTPUT}}/base
      - >
        java -jar {{.ANTLR_JAR}}
        -Dlanguage=Python3
        -no-listener -visitor
        -o {{.DIR_OUTPUT}}
        {{.LEXER_FILE}}
        {{.PARSER_FILE}}
      - echo Done.

  # ci-generate:
