  update-generate:
    desc: Generate using antlr4 wrapper
    #platforms: [windows]
    cmds:
      - echo Generate sources for the grammar...
      - >
        java -jar {{.ANTLR_JAR}}
        -o {{.DIR_OUTPUT}}
        -Dlanguage=Python3
        {{.PARSER_FILE}}
        {{.LEXER_FILE}}
        -no-listener -visitor
      - echo Done.

